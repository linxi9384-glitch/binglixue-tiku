}
checkResume();

function resumeExam(){
  var p = parseInt(document.getElementById('resumeBox').dataset.paper);
  loadExam(p, true);
}
function dismissResume(){
  document.getElementById('resumeBox').style.display = 'none';
  var p = parseInt(document.getElementById('resumeBox').dataset.paper);
  localStorage.removeItem('pe_'+p);
}

function startExam(i){
  localStorage.removeItem('pe_'+i);
  loadExam(i, false);
}

function loadExam(i, resume){
  currentPaper = i;
  var s = resume ? JSON.parse(localStorage.getItem('pe_'+i)) : null;
  if(s && s.answers){
    userAnswers = s.answers;
    timeLeft = s.timeLeft;
    currentQ = s.currentQ;
    markedQs = new Set(s.markedQs || []);
    selfScores = s.selfScores || {};
  } else {
    userAnswers = PAPERS[i].map(function(q){
      if(q.type==='single') return {val:-1};
      if(q.type==='multi') return {val:[]};
      return {val:''};
    });
    timeLeft = 5400;
    currentQ = 0;
    markedQs = new Set();
    selfScores = {};
  }
  document.getElementById('landing').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('examArea').style.display = 'block';
  document.getElementById('sidebar').style.display = window.innerWidth>=769?'block':'none';
  document.getElementById('paperTitle').textContent = ['??','??','??'][i] + ' ? ???????';
  examActive = true;
  renderSidebar();
  renderQuestion();
  startTimer();
  saveProgress();
}

function saveProgress(){
  if(!examActive) return;
  var d = {examActive:examActive, timeLeft:timeLeft, currentQ:currentQ, answers:userAnswers, markedQs:[...markedQs], selfScores:selfScores};
  localStorage.setItem('pe_'+currentPaper, JSON.stringify(d));
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(function(){
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0){ clearInterval(timerInterval); submitExam(); }
    if(timeLeft % 30 === 0) saveProgress();
  }, 1000);
}

function updateTimerDisplay(){
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('timer').textContent = m + ':' + String(s).padStart(2,'0');
  if(timeLeft < 300) document.getElementById('timer').classList.add('warn');
  else document.getElementById('timer').classList.remove('warn');
}

    for(var j=sec.s; j<sec.e; j++){
      var cls = 'q-dot';
      if(j === currentQ) cls += ' current';
      if(markedQs.has(j)) cls += ' marked';
      var a = userAnswers[j];
      if(a){
        if(P[j].type==='single' && a.val>=0) cls += ' answered';
        if(P[j].type==='multi' && a.val.length>0) cls += ' answered';
        if((P[j].type==='term'||P[j].type==='short'||P[j].type==='essay') && a.val.trim()) cls += ' answered';
      }
      html += '<div class="'+cls+'" onclick="jumpTo('+j+')">'+(j+1)+'</div>';
    }
  }
  html += '</div>';
  var ans = 0;
  for(var j=0; j<P.length; j++){
    var a = userAnswers[j];
    if(!a) continue;
    if(P[j].type==='single' && a.val>=0) ans++;
    if(P[j].type==='multi' && a.val.length>0) ans++;
    if((P[j].type==='term'||P[j].type==='short'||P[j].type==='essay') && a.val.trim()) ans++;
  }
  html += '<div class="progress-text">' + ans + '/' + P.length + ' ??</div>';
  document.getElementById('sidebar').innerHTML = html;
}

function jumpTo(i){ currentQ = i; renderQuestion(); renderSidebar(); saveProgress(); }
function prevQ(){ if(currentQ>0){ currentQ--; renderQuestion(); renderSidebar(); saveProgress(); } }
function nextQ(){ if(currentQ<PAPERS[currentPaper].length-1){ currentQ++; renderQuestion(); renderSidebar(); saveProgress(); } }
function toggleMark(){ if(markedQs.has(currentQ)) markedQs.delete(currentQ); else markedQs.add(currentQ); renderSidebar(); saveProgress(); }

function renderQuestion(){
  var P = PAPERS[currentPaper];
  var q = P[currentQ];
  var tn = {single:'???', multi:'????????????', term:'????', short:'???', essay:'????????'};
  var bc = {single:'single', multi:'multi', term:'term', short:'short', essay:'essay'};
  var h = '<div class="q-card current">';
  h += '<span class="q-type-badge '+bc[q.type]+'">'+tn[q.type]+' ? '+(currentQ+1)+'/'+P.length+'</span>';
  h += '<div class="q-text">'+q.q.replace(/\n/g,'<br>')+'</div>';
  
  if(q.type === 'single'){
    h += '<div class="options">';
    for(var j=0; j<q.options.length; j++){
      var sel = (userAnswers[currentQ] && userAnswers[currentQ].val===j) ? ' selected' : '';
      h += '<label class="option'+sel+'" onclick="selectSingle('+j+',this)">'+q.options[j]+'</label>';
    }
    h += '</div>';
  } else if(q.type === 'multi'){
    h += '<div class="options">';
    for(var j=0; j<q.options.length; j++){
      var sel = (userAnswers[currentQ] && userAnswers[currentQ].val.includes(j)) ? ' selected' : '';
      h += '<label class="option'+sel+'" onclick="selectMulti('+j+',this)">'+q.options[j]+'</label>';
    }
    h += '</div>';
  } else {
    h += '<textarea class="text-area" id="textInput" placeholder="????????..." oninput="saveTextAnswer()">';
    h += (userAnswers[currentQ] ? userAnswers[currentQ].val : '');
    h += '</textarea>';
  }
  h += '</div>';
  
  document.getElementById('qContainer').innerHTML = h;
  
  // Scroll to top on mobile
  if(window.innerWidth<769) window.scrollTo({top:0,behavior:'smooth'});
}

function selectSingle(idx, el){
  userAnswers[currentQ].val = idx;
  var labels = el.parentElement.querySelectorAll('.option');
  for(var j=0; j<labels.length; j++) labels[j].classList.remove('selected');
  el.classList.add('selected');
  renderSidebar();
  saveProgress();
}

function selectMulti(idx, el){
  var arr = userAnswers[currentQ].val;
  var pos = arr.indexOf(idx);
  if(pos >= 0) arr.splice(pos, 1);
  else arr.push(idx);
  el.classList.toggle('selected');
  renderSidebar();
  saveProgress();
}

function saveTextAnswer(){
  var ta = document.getElementById('textInput');
  if(ta) userAnswers[currentQ].val = ta.value;
  renderSidebar();
  saveProgress();
}

function confirmSubmit(){
  var unanswered = 0;
  for(var j=0; j<userAnswers.length; j++){
    var a = userAnswers[j];
    if(PAPERS[currentPaper][j].type==='single' && a.val<0) unanswered++;
    if(PAPERS[currentPaper][j].type==='multi' && a.val.length===0) unanswered++;
    if((PAPERS[currentPaper][j].type==='term'||PAPERS[currentPaper][j].type==='short'||PAPERS[currentPaper][j].type==='essay') && !a.val.trim()) unanswered++;
  }
  var msg = '???????';
  if(unanswered > 0) msg += '\n?? ' + unanswered + ' ??????';
  if(confirm(msg)) submitExam();
}

function arraysEqual(a, b){
  if(a.length !== b.length) return false;
  var sa = a.slice().sort();
  var sb = b.slice().sort();
  for(var j=0; j<sa.length; j++) if(sa[j]!==sb[j]) return false;
  return true;
}

function submitExam(){
  if(!examActive) return;
  examActive = false;
  if(timerInterval) clearInterval(timerInterval);
  
  var P = PAPERS[currentPaper];
  var ss = 0; // single score
  var ms = 0; // multi score
  var results = [];
  
  for(var j=0; j<P.length; j++){
    var q = P[j];
    var ua = userAnswers[j];
    var r = {i:j, type:q.type};
    
    if(q.type === 'single'){
      var correct = (ua.val === q.answer);
      if(correct) ss++;
      r.correct = correct;
      r.userDisplay = ua.val>=0 ? q.options[ua.val] : '?????';
      r.correctDisplay = q.options[q.answer];
    } else if(q.type === 'multi'){
      var correct = arraysEqual(ua.val, q.answer);
      if(correct) ms++;
      r.correct = correct;
      r.userDisplay = ua.val.map(function(v){return q.options[v];}).join('?') || '?????';
      r.correctDisplay = q.answer.map(function(v){return q.options[v];}).join('?');
    } else {
      r.userDisplay = ua.val || '';
      r.ref = q.r || '??????';
    }
    results.push(r);
  }
  
  var objScore = ss + ms * 2; // singles 1pt each, multis 2pt each (total 70)
  
  // Render results
  var html = '<div class="score-card">';
  html += '<div class="big-score" id="totalScore">'+objScore+'</div>';
  html += '<p style="color:rgba(255,255,255,.8)">????????50?+??20????70?</p>';
  html += '<div style="display:flex;justify-content:center;gap:24px;margin-top:12px">';
  html += '<div><span style="font-size:1.3em;font-weight:700">'+ss+'</span><br><span style="font-size:.8em;opacity:.8">??</span></div>';
  html += '<div><span style="font-size:1.3em;font-weight:700">'+(ms*2)+'</span><br><span style="font-size:.8em;opacity:.8">??</span></div>';
  html += '</div>';
  html += '<p style="margin-top:14px;font-size:.95em;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:8px;display:inline-block">???????????? ?</p>';
  html += '</div>';
  
  html += '<div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 8px rgba(0,0,0,.04);margin-bottom:20px"><h3 style="margin-bottom:4px">?????</h3><p style="color:#888;font-size:.85em">??????????????????????????</p></div>';
  
  for(var ri=0; ri<results.length; ri++){
    var r = results[ri];
    var q = P[r.i];
    var n = r.i + 1;
    if(r.type==='term' || r.type==='short' || r.type==='essay'){
      var mx = r.type==='term' ? 2 : (r.type==='short' ? 3 : 8);
      var typeName = {term:'????',short:'???',essay:'???'}[r.type];
      html += '<div class="answer-review subj">';
      html += '<strong>?'+n+'??'+typeName+'?</strong>';
      html += '<p style="margin:8px 0;font-size:.93em;line-height:1.6;white-space:pre-wrap">'+q.q+'</p>';
      html += '<p style="color:#888;font-size:.83em"><b>?????</b><br>'+(r.userDisplay||'?????').replace(/\n/g,'<br>')+'</p>';
      html += '<div class="ref-answer"><b>?????</b><br>'+r.ref.replace(/\n/g,'<br>')+'</div>';
      html += '<div class="self-assess"><span style="font-size:.8em;color:#888">???</span>';
      if(mx >= 8){
        html += '<button onclick="selfAssess('+r.i+','+mx+','+mx+',this)">????('+mx+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+','+Math.round(mx*0.75)+','+mx+',this)">?????('+Math.round(mx*0.75)+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+','+Math.round(mx*0.5)+','+mx+',this)">????('+Math.round(mx*0.5)+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+','+Math.round(mx*0.25)+','+mx+',this)">????('+Math.round(mx*0.25)+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+',0,'+mx+',this)">????(0?)</button>';
      } else {
        html += '<button onclick="selfAssess('+r.i+','+mx+','+mx+',this)">????('+mx+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+','+Math.round(mx/2)+','+mx+',this)">????('+Math.round(mx/2)+'?)</button>';
        html += '<button onclick="selfAssess('+r.i+',0,'+mx+',this)">????(0?)</button>';
      }
      html += '</div></div>';
    } else {
      html += '<div class="answer-review '+(r.correct?'correct':'incorrect')+'">';
      html += '<strong>?'+n+'??'+{single:'???',multi:'???'}[r.type]+'? '+(r.correct?'? ??':'? ??')+'</strong>';
      html += '<p style="margin:6px 0;font-size:.93em">'+q.q+'</p>';
      html += '<p style="color:'+(r.correct?'#4caf50':'#e53935')+';font-size:.85em"><b>?????</b>'+r.userDisplay+'</p>';
      if(!r.correct) html += '<p style="color:#4caf50;font-size:.85em"><b>?????</b>'+r.correctDisplay+'</p>';
      html += '</div>';
    }
  }
  
  html += '<div style="text-align:center;margin:20px 0"><button onclick="calcTotalScore()" class="btn-big btn-primary">????</button></div>';
  html += '<div id="finalScoreBox" style="text-align:center;display:none"><div style="font-size:3.5em;font-weight:800;color:#4361ee" id="finalScore"></div><div style="font-size:1.3em;font-weight:700;margin:8px 0" id="finalGrade"></div></div>';
  html += '<div style="text-align:center;margin:24px 0"><button onclick="backToLanding()" class="btn-back">? ??????</button></div>';
  
  document.getElementById('examArea').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').innerHTML = html;
  document.getElementById('landing').style.display = 'none';
  window._rd = {objScore:objScore, results:results, paper:currentPaper};
  window.scrollTo({top:0,behavior:'smooth'});
  
  // Clear saved progress after submission
  localStorage.removeItem('pe_'+currentPaper);
}

function selfAssess(i, s, mx, btn){
  var btns = btn.parentElement.querySelectorAll('button');
  for(var j=0; j<btns.length; j++) btns[j].classList.remove('picked');
  btn.classList.add('picked');
  selfScores[i] = s;
}

function calcTotalScore(){
  var d = window._rd;
  var st = 0;
  var P = PAPERS[d.paper];
  for(var j=0; j<P.length; j++){
    if(P[j].type==='term' || P[j].type==='short' || P[j].type==='essay'){
      if(selfScores[j] !== undefined) st += selfScores[j];
    }
  }
  var t = d.objScore + st;
  var g = '';
  if(t >= 90) g = '??';
  else if(t >= 80) g = '??';
  else if(t >= 70) g = '??';
  else if(t >= 60) g = '??';
  else g = '???';
  document.getElementById('finalScoreBox').style.display = 'block';
  document.getElementById('finalScore').textContent = t + ' / 100';
  document.getElementById('finalGrade').textContent = g;
  document.getElementById('totalScore').textContent = t + ' / 100';
  window.scrollTo({top:0,behavior:'smooth'});
}

function backToLanding(){
  document.getElementById('examArea').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  examActive = false;
  selfScores = {};
  if(timerInterval) clearInterval(timerInterval);
  checkResume();
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if(!examActive) return;
  if(e.key === 'ArrowLeft') prevQ();
  if(e.key === 'ArrowRight') nextQ();
  if(e.key === 'm' && !e.ctrlKey) toggleMark();
});

// Touch swipe for mobile
var touchStartX = 0;
document.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', function(e){
  if(!examActive) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 80){
    if(dx < 0) nextQ();
    else prevQ();
  }
});
</script>
