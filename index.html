<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>病理学模拟考试 · 三套卷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2f5bea;--primary-dark:#172554;--danger:#dc2626;--ok:#16a34a;--warn:#f59e0b;--ink:#172033;--muted:#64748b;--bg:#f6f8fc;--card:#fff;--line:#e2e8f0}
body{font-family:"Microsoft YaHei","PingFang SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
button,input,textarea{font-family:inherit}
.topbar{background:linear-gradient(135deg,#172554,#1e1b4b);color:#fff;padding:12px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 16px rgba(15,23,42,.22)}
.topbar h1{font-size:1.06rem;font-weight:800;white-space:nowrap}.timer{font-size:1.1rem;font-weight:900;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.16);letter-spacing:.02em}.timer.warn{background:var(--danger);animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.landing{max-width:1040px;margin:0 auto;padding:24px 16px 44px;display:flex;flex-direction:column;gap:20px}.hero{background:linear-gradient(135deg,#2f5bea,#5b21b6);color:#fff;border-radius:22px;padding:30px 24px;text-align:center;box-shadow:0 14px 36px rgba(47,91,234,.2)}.hero h2{font-size:1.42rem;margin-bottom:10px}.hero p{font-size:.96rem;line-height:1.75;opacity:.94}.resume-box{display:none;background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:16px;text-align:center}.resume-box p{color:#9a3412}.resume-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap}.section-title{text-align:center;font-size:1.32rem}.paper-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.paper-card{background:var(--card);border:2px solid transparent;border-radius:20px;padding:26px 22px;text-align:center;cursor:pointer;box-shadow:0 8px 26px rgba(15,23,42,.07);transition:.2s}.paper-card:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(15,23,42,.12)}.paper-card:nth-child(1):hover{border-color:#2f5bea}.paper-card:nth-child(2):hover{border-color:#7c3aed}.paper-card:nth-child(3):hover{border-color:#db2777}.paper-num{font-size:2.25rem;font-weight:900;margin-bottom:8px}.paper-card:nth-child(1) .paper-num{color:#2f5bea}.paper-card:nth-child(2) .paper-num{color:#7c3aed}.paper-card:nth-child(3) .paper-num{color:#db2777}.paper-title{font-weight:800}.paper-info{margin-top:12px;color:var(--muted);font-size:.86rem}.paper-info span{display:inline-block;background:#f1f5f9;border-radius:999px;padding:5px 10px;margin:3px 4px}
.exam-area{max-width:980px;margin:0 auto;padding:0 12px 90px;display:none}.exam-header{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:16px 0 12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(15,23,42,.05)}.exam-title{font-weight:800}.nav-buttons{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:9px 14px;cursor:pointer;font-size:.92rem}.btn:hover{border-color:var(--primary);color:var(--primary)}.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn-primary:hover{color:#fff}.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}.btn-danger:hover{color:#fff}.btn-warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.question-card{background:var(--card);border-radius:18px;border-left:5px solid var(--primary);padding:20px;margin-bottom:14px;box-shadow:0 2px 14px rgba(15,23,42,.06)}.badge{display:inline-block;border-radius:999px;padding:5px 12px;font-weight:800;font-size:.8rem;margin-bottom:12px}.badge.single{background:#dbeafe;color:#1d4ed8}.badge.multi{background:#fce7f3;color:#be185d}.badge.term{background:#dcfce7;color:#15803d}.badge.short{background:#ffedd5;color:#c2410c}.badge.essay{background:#f3e8ff;color:#7e22ce}.question-text{font-size:1rem;line-height:1.82;margin-bottom:14px;white-space:pre-wrap}.options{display:flex;flex-direction:column;gap:9px}.option{border:2px solid var(--line);background:#fff;border-radius:13px;padding:14px 16px;line-height:1.58;min-height:50px;display:flex;align-items:center;cursor:pointer;transition:.14s}.option:hover{border-color:var(--primary);background:#f8fbff}body.suppress-option-hover .option:not(.selected):hover{border-color:var(--line);background:#fff}.option.selected{border-color:var(--primary);background:#eef4ff;font-weight:700}.text-answer{width:100%;min-height:190px;border:2px solid var(--line);border-radius:14px;padding:14px;font-size:.96rem;line-height:1.8;resize:vertical}.text-answer:focus{outline:none;border-color:var(--primary)}
.sidebar{position:fixed;right:0;top:58px;bottom:0;width:292px;background:#fff;border-left:1px solid var(--line);box-shadow:-2px 0 20px rgba(15,23,42,.08);padding:16px;overflow:auto;z-index:90;display:none}.sidebar h3{font-size:.96rem;margin-bottom:10px}.q-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.section-label{grid-column:span 10;font-size:.76rem;color:var(--muted);font-weight:800;padding:5px 0 2px}.q-dot{aspect-ratio:1;border-radius:8px;background:#e5e7eb;color:#475569;font-size:.72rem;display:flex;align-items:center;justify-content:center;cursor:pointer}.q-dot.answered{background:#86efac;color:#14532d}.q-dot.current{background:var(--primary);color:#fff;transform:scale(1.12)}.q-dot.marked{box-shadow:inset 0 0 0 2px var(--warn)}.progress-text{text-align:center;color:var(--muted);font-size:.85rem;margin-top:12px}
.results{max-width:920px;margin:0 auto;padding:20px 16px;display:none}.score-card{background:linear-gradient(135deg,#2f5bea,#5b21b6);color:#fff;border-radius:20px;text-align:center;padding:30px 24px;margin-bottom:18px}.big-score{font-size:3.3rem;font-weight:900}.answer-review{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(15,23,42,.05)}.answer-review.correct{border-left:5px solid var(--ok)}.answer-review.incorrect{border-left:5px solid var(--danger)}.answer-review.subj{border-left:5px solid var(--warn)}.ref-answer{background:#f8fafc;border-radius:12px;padding:14px 16px;margin:10px 0;font-size:.92rem;line-height:1.72;white-space:pre-wrap}.self-assess{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.self-assess button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;cursor:pointer}.self-assess button.picked{background:var(--primary);border-color:var(--primary);color:#fff}.footer{text-align:center;color:#94a3b8;font-size:.8rem;padding:20px}
@media(min-width:1040px){body.exam-open .exam-area{margin-right:304px}.sidebar{display:block}}
@media(max-width:768px){.topbar{padding:10px 12px}.topbar h1{font-size:.98rem}.timer{font-size:.96rem;padding:6px 11px}.hero{padding:22px 16px}.hero h2{font-size:1.16rem}.hero p{font-size:.92rem}.paper-cards{grid-template-columns:1fr}.exam-header{align-items:stretch}.nav-buttons{width:100%;display:grid;grid-template-columns:repeat(2,1fr)}.btn{padding:11px 12px}.question-card{padding:16px}.question-text{font-size:1rem}.text-answer{min-height:220px}.sidebar{position:static;width:auto;display:block!important;border-left:0;box-shadow:none;margin:12px 0;border-radius:16px}.q-grid{grid-template-columns:repeat(10,1fr)}}

.api-key-section{background:var(--card);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(15,23,42,.05)}.api-key-section input{flex:1;min-width:200px;border:2px solid var(--line);border-radius:10px;padding:10px 14px;font-size:.92rem}.api-key-section input:focus{outline:none;border-color:var(--primary)}.ai-grade-btn,.ai-explain-btn{border-color:#7c3aed;color:#7c3aed;font-size:.85rem;padding:6px 12px;margin-top:6px}.ai-grade-btn:hover,.ai-explain-btn:hover{border-color:#5b21b6;color:#5b21b6;background:#f5f3ff}.ai-response{background:#f5f3ff;border-radius:12px;padding:14px 16px;margin-top:10px;font-size:.9rem;line-height:1.72;white-space:pre-wrap}.ai-response.ai-error{background:#fef2f2;color:#dc2626}.ai-grade-box,.ai-explain-box{margin-top:8px}
</style>
</head>
<body>
  <header class="topbar">
    <h1>病理学模拟考试</h1>
    <div class="timer" id="timer">90:00</div>
  </header>

  <main class="landing" id="landing">
    <section class="hero">
      <h2>病理学（第10版）期末模拟考试</h2>
      <p>三套完整试卷 · 每套含 50 单选 + 10 多选 + 5 名词解释 + 4 简答题 + 1 病例分析<br>限时 90 分钟 · 支持断点续做 · 客观题自动批改</p>
    </section>

    <section class="resume-box" id="resumeBox">
      <p id="resumeMsg"></p>
      <div class="resume-actions">
        <button class="btn btn-primary" type="button" onclick="resumeExam()">继续上次</button>
        <button class="btn" type="button" onclick="dismissResume()">重新开始</button>
      </div>
    </section>

    <section class="api-key-section" id="apiKeySection">
      <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key（可选，用于 AI 批改和解析）" oninput="saveApiKey(this.value)">
      <span id="apiKeyStatus" style="font-size:.82rem;color:var(--muted)"></span>
    </section>
    <div style="text-align:center;margin-top:4px"><button class="btn" type="button" onclick="showWrongBook()" style="border-color:#7c3aed;color:#7c3aed">错题册</button> <button class="btn" type="button" onclick="showHistory()" style="border-color:#2f5bea;color:#2f5bea">做题记录</button></div>
    <h2 class="section-title">选择试卷</h2>
    <section class="paper-cards">
      <article class="paper-card" onclick="startExam(0)">
        <div class="paper-num">卷一</div>
        <div class="paper-title">综合模拟卷一</div>
        <div class="paper-info"><span>50 单选</span><span>10 多选</span><span>5 名解</span><span>4 简答</span><span>1 病例</span></div>
      </article>
      <article class="paper-card" onclick="startExam(1)">
        <div class="paper-num">卷二</div>
        <div class="paper-title">综合模拟卷二</div>
        <div class="paper-info"><span>50 单选</span><span>10 多选</span><span>5 名解</span><span>4 简答</span><span>1 病例</span></div>
      </article>
      <article class="paper-card" onclick="startExam(2)">
        <div class="paper-num">卷三</div>
        <div class="paper-title">综合模拟卷三</div>
        <div class="paper-info"><span>50 单选</span><span>10 多选</span><span>5 名解</span><span>4 简答</span><span>1 病例</span></div>
      </article>
    </section>
  </main>

  <main class="exam-area" id="examArea">
    <section class="exam-header">
      <span class="exam-title" id="paperTitle"></span>
      <div class="nav-buttons">
        <button class="btn" type="button" onclick="prevQ()">上一题</button>
        <button class="btn" type="button" onclick="nextQ()">下一题</button>
        <button class="btn btn-warn" type="button" onclick="toggleMark()">标记</button>
        <button class="btn btn-danger" type="button" onclick="confirmSubmit()">交卷</button>
        <button class="btn" type="button" onclick="goHome()" style="border-color:#64748b;color:#64748b">返回主页</button>
      </div>
    </section>
    <section id="questionContainer"></section>
  </main>

  <aside class="sidebar" id="sidebar"></aside>
  <main class="results" id="results"></main>
  <footer class="footer">病理学第 10 版 · 平板友好 · 可部署到 GitHub Pages</footer>

  <script src="./papers.js?v=20260624"></script>
  <script src="./app.js?v=2026062402"></script>
</body>
</html>
