let currentChapter = -1;
let currentMode = 'all';
let userAnswers = {};
let submitted = false;

function init() {
    let grid = document.getElementById('chGrid');
    CHAPTERS.forEach((ch, i) => {
        let sc = ch.singles.length;
        let mc = ch.multis.length;
        let card = document.createElement('div');
        card.className = 'ch-card';
        card.onclick = () => startQuiz(i);
        card.innerHTML = '<h3>' + ch.chapter + '</h3>' +
            '<div class="stats">共 ' + (sc+mc) + ' 题</div>' +
            '<div class="badges"><span class="badge">单选 '+sc+'</span><span class="badge">多选 '+mc+'</span></div>';
        grid.appendChild(card);
    });
}

function startQuiz(i) {
    currentChapter = i;
    currentMode = 'all';
    submitted = false;
    userAnswers = {};
    document.getElementById('landing').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    document.getElementById('resultBar').style.display = 'none';
    document.getElementById('quizTitle').textContent = CHAPTERS[i].chapter;
    document.getElementById('topInfo').textContent = '正在练习: ' + CHAPTERS[i].chapter;
    document.querySelectorAll('.mode-tab').forEach((t,j) => t.classList.toggle('active', j===0));
    renderQuestions();
}

function backToChapters() {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('landing').style.display = 'block';
    document.getElementById('topInfo').textContent = '超星作业 · 按章节练习';
}

function renderQuestions() {
    let ch = CHAPTERS[currentChapter];
    let allQs = [...ch.singles.map((q,i) => ({...q, type:'single', idx:i, globalType:'single'})),
                  ...ch.multis.map((q,i) => ({...q, type:'multi', idx:i, globalType:'multi'}))];
    
    if (currentMode === 'wrong') {
        allQs = allQs.filter(q => {
            let key = q.globalType + '_' + q.idx;
            let ua = userAnswers[key];
            if (!submitted || ua === undefined) return false;
            if (q.type === 'single') return ua !== q.answer;
            if (q.type === 'multi') {
                if (!q.answer) return false;
                let uSet = new Set(ua || []);
                let aSet = new Set(q.answer);
                return !(uSet.size === aSet.size && [...uSet].every(v => aSet.has(v)));
            }
            return false;
        });
    }
    
    let html = '';
    allQs.forEach((q, displayIdx) => {
        let key = q.globalType + '_' + q.idx;
        let ua = userAnswers[key];
        let isCorrect = false;
        if (submitted) {
            if (q.type === 'single') isCorrect = (ua === q.answer);
            else if (q.type === 'multi' && q.answer) {
                let uSet = new Set(ua || []);
                let aSet = new Set(q.answer);
                isCorrect = (uSet.size === aSet.size && [...uSet].every(v => aSet.has(v)));
            }
        }
        let cls = 'q-card';
        if (submitted) cls += isCorrect ? ' correct-submitted' : ' wrong-submitted';
        
        html += '<div class="' + cls + '"><div class="q-num">' + (displayIdx+1) + 
            '. <span class="q-type">' + (q.type==='single'?'单选':'多选') + '</span></div>';
        html += '<div class="q-text">' + escapeHtml(q.text) + '</div>';
        html += '<div class="options">';
        
        q.options.forEach((opt, oi) => {
            let sel = '';
            if (q.type === 'single') sel = (ua === oi) ? ' selected' : '';
            else sel = (ua && ua.includes(oi)) ? ' selected' : '';
            let inpType = q.type === 'single' ? 'radio' : 'checkbox';
            html += '<label class="option' + sel + '"' + (submitted?'':' onclick="selectOption(\''+key+'\','+oi+','+(q.type==='multi')+',this)"') + '>';
            html += '<input type="' + inpType + '" ' + (sel?'checked':'') + ' disabled>' + escapeHtml(opt) + '</label>';
        });
        
        html += '</div>';
        
        if (submitted && q.answer !== undefined) {
            let correctOpts = q.type === 'single' ? [q.answer] : q.answer;
            let correctText = correctOpts.map(i => q.options[i]).join('；');
            html += '<div class="correct-answer show">✅ 正确答案：' + escapeHtml(correctText) + '</div>';
        }
        
        html += '</div>';
    });
    
    document.getElementById('qContainer').innerHTML = html || '<p style="text-align:center;color:#888;padding:40px">暂无题目</p>';
}

function selectOption(key, idx, isMulti, el) {
    if (submitted) return;
    if (isMulti) {
        if (!userAnswers[key]) userAnswers[key] = [];
        let arr = userAnswers[key];
        let p = arr.indexOf(idx);
        if (p >= 0) arr.splice(p, 1); else arr.push(idx);
    } else {
        userAnswers[key] = idx;
    }
    renderQuestions();
}

function submitQuiz() {
    if (submitted) {
        submitted = false;
        userAnswers = {};
        document.getElementById('resultBar').style.display = 'none';
        document.querySelector('.btn-submit').textContent = '交卷';
        renderQuestions();
        window.scrollTo(0,0);
        return;
    }
    submitted = true;
    document.querySelector('.btn-submit').textContent = '重新做';
    
    let ch = CHAPTERS[currentChapter];
    let total = 0, correct = 0;
    let allQs = [...ch.singles.map((q,i) => ({...q, type:'single', idx:i, globalType:'single'})),
                  ...ch.multis.map((q,i) => ({...q, type:'multi', idx:i, globalType:'multi'}))];
    
    allQs.forEach(q => {
        if (q.answer === undefined) return;
        total++;
        let key = q.globalType + '_' + q.idx;
        let ua = userAnswers[key];
        if (q.type === 'single' && ua === q.answer) correct++;
        else if (q.type === 'multi') {
            let uSet = new Set(ua || []);
            let aSet = new Set(q.answer);
            if (uSet.size === aSet.size && [...uSet].every(v => aSet.has(v))) correct++;
        }
    });
    
    document.getElementById('resultBar').style.display = 'block';
    let pct = total > 0 ? Math.round(correct/total*100) : 0;
    document.getElementById('scoreDisplay').textContent = correct + '/' + total;
    document.getElementById('scoreDetail').innerHTML = '正确率 ' + pct + '% &nbsp;|&nbsp; 共' + total + '题';
    
    renderQuestions();
    window.scrollTo(0,0);
}

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach((t,j) => {
        t.classList.toggle('active', (j===0 && mode==='all') || (j===1 && mode==='wrong'));
    });
    renderQuestions();
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
